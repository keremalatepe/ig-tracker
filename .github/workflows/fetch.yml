name: Instagram Data Fetcher

on:
  schedule:
    # Her saatin 17. dakikasında çalışır (queue daha az yoğun, geç başlama az olur)
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Çalışma modu"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - hourly
          - daily
          - weekly
          - full

permissions:
  contents: write

concurrency:
  group: ig-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Restore token cache
        uses: actions/cache@v4
        with:
          path: token.json
          key: ig-token-${{ github.run_id }}
          restore-keys: ig-token-

      - name: Run schema migration
        run: python migrate_schema.py

      - name: Run fetcher
        env:
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python ig_fetcher.py --mode "${{ github.event.inputs.mode || 'auto' }}"

      - name: Build dashboard JSON
        run: python export_for_dashboard.py

      - name: Commit data to repo
        run: |
          git config user.name "ig-bot"
          git config user.email "bot@noreply.github.com"
          git add instagram_data.db dashboard_data.json
          git diff --staged --quiet || git commit -m "📊 Veri güncellendi: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event.inputs.mode || 'auto' }}]"
          git push
