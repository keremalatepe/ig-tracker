name: Social Media Data Fetcher

on:
  schedule:
    # Her saatin 17. dakikasında çalışır (queue daha az yoğun, geç başlama az olur)
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Çalışma modu"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - hourly
          - daily
          - weekly
          - full
          - backfill
      yt_mode:
        description: "YouTube modu"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - hourly
          - full

permissions:
  contents: write

concurrency:
  group: ig-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Restore token cache
        uses: actions/cache@v4
        with:
          path: |
            token.json
            yt_token.json
          key: tokens-${{ github.run_id }}
          restore-keys: tokens-

      - name: Run Instagram schema migration
        run: python migrate_schema.py

      - name: Run YouTube schema migration
        run: python migrate_yt_schema.py

      - name: Run Instagram fetcher
        env:
          IG_APP_ID: ${{ secrets.IG_APP_ID }}
          IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python ig_fetcher.py --mode "${{ github.event.inputs.mode || 'auto' }}"

      - name: Run YouTube fetcher
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python yt_fetcher.py --mode "${{ github.event.inputs.yt_mode || 'auto' }}"

      - name: Build dashboard JSON
        run: python export_for_dashboard.py

      - name: Commit data to repo
        run: |
          git config user.name "ig-bot"
          git config user.email "bot@noreply.github.com"
          git add instagram_data.db youtube_data.db dashboard_data.json
          git diff --staged --quiet || git commit -m "📊 Veri güncellendi: $(date -u '+%Y-%m-%d %H:%M UTC') [${{ github.event.inputs.mode || 'auto' }}]"
          git push
